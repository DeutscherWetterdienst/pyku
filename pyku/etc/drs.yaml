---

standards:

    cmip6:

        # References
        # ----------

        # https://wcrp-cmip.github.io/WGCM_Infrastructure_Panel/Papers/
        # CMIP6_global_attributes_filenames_CVs_v6.2.7.pdf

        metadata:
            - variable_id
            - table_id
            - source_id
            - experiment_id
            - member_id
            - grid_label
            - mip_era
            - activity_id
            - institution_id

        stem_pattern:
            "{variable_id}_{table_id}_{source_id}_{experiment_id}_{member_id}_\
            {grid_label}_{start_time}-{end_time}"

        parent_pattern:
            "{mip_era}/{activity_id}/{institution_id}/{source_id}/\
             {experiment_id}/{member_id}/{table_id}/{variable_id}/\
             {grid_label}/"

    cmip5:

        # References
        # ----------

        # https://pcmdi.llnl.gov/mips/cmip5/
        # CMIP5_output_metadata_requirements.pdf

        metadata:
            - MIP_table
            - model
            - experiment
            - ensemble_member
            - activity
            - product
            - institute
            - frequency
            - modeling_realm

        stem_pattern:
            "{variable_name}_{MIP_table}_{model}_{experiment}_\
             {ensemble_member}_{start_time}-{end_time}"

        parent_pattern:
            "{activity}/{product}/{institute}/{model}/{experiment}/\
             {frequency}/{modeling_realm}/{variable_name}/{ensemble_member}"

    cordex:

        # References
        # ----------

        # http://is-enes-data.github.io/
        # http://is-enes-data.github.io/cordex_archive_specifications.pdf
        # http://is-enes-data.github.io/CORDEX_variables_requirement_table.pdf

        # The stem/parent wording stems from the pathlib library
        # https://docs.python.org/3/library/pathlib.html

        metadata:
            - CORDEX_domain
            - driving_model_id
            - driving_experiment_name
            - driving_model_ensemble_member
            - model_id
            - rcm_version_id
            - frequency
            - product
            - institute_id
            - experiment_id

        stem_pattern:
            "{variable_name}_{CORDEX_domain}_{driving_model_id}_\
             {driving_experiment_name}_{driving_model_ensemble_member}_\
             {model_id}_{rcm_version_id}_{frequency}_{start_time}-{end_time}"

        parent_pattern:
            "{product}/{CORDEX_domain}/{institute_id}/{driving_model_id}/\
             {driving_experiment_name}/{driving_model_ensemble_member}/{model_id}/\
             {rcm_version_id}/{frequency}/{variable_name}"


    cordex_adjust:

        # References
        # ----------

        # https://github.com/IS-ENES-Data/IS-ENES-Data.github.io/blob/master/
        # CORDEX_adjust_drs.pdf
        # Adapted for CORDEX-CMIP6

        metadata:
            - variable_id
            - project_id
            - activity_id
            - domain_id
            - institution_id
            - driving_source_id
            - driving_experiment_id
            - driving_variant_label
            - source_id
            - version_realization
            - frequency
            - bc_method_id
            - bc_observation_id
            - bc_period
            - bc_info
            - frequency
            - start_time
            - end_time

        stem_pattern:
            "{variable_id}_{domain_id}_{driving_source_id}_{driving_experiment_id}_\
	     {driving_variant_label}_{institution_id}_{source_id}_\
	     {version_realization}_{bc_method_id}_\
             {frequency}_{start_time}-{end_time}"

        parent_pattern:
            "{project_id}/{activity_id}/{domain_id}/{institution_id}/\
	     {driving_source_id}/{driving_experiment_id}/\
	     {driving_variant_label}/{source_id}/{version_realization}/\
	     {bc_method_id}/{frequency}/{variable_id}/"

    cordex_interp:

        # References
        # ----------

        # No existing reference, loosely based on:
        # https://github.com/IS-ENES-Data/IS-ENES-Data.github.io/blob/master/
        # CORDEX_adjust_drs.pdf
        # Adapted for CORDEX-CMIP6

        metadata:
            - variable_id
            - project_id
            - activity_id
            - domain_id
            - institution_id
            - driving_source_id
            - driving_experiment_id
            - driving_variant_label
            - source_id
            - version_realization
            - frequency
            - bc_method_id
            - bc_observation_id
            - bc_period
            - interp_method_id
            - interp_observation_id
            - interp_period
            - interp_info
            - frequency
            - start_time
            - end_time

        stem_pattern:
            "{variable_id}_{domain_id}_{driving_source_id}_{driving_experiment_id}_\
	     {driving_variant_label}_{institution_id}_{source_id}_\
	     {version_realization}_{interp_method_id}_\
             {frequency}_{start_time}-{end_time}"

        parent_pattern:
            "{project_id}/{activity_id}/{domain_id}/{institution_id}/\
	     {driving_source_id}/{driving_experiment_id}/\
	     {driving_variant_label}/{source_id}/{version_realization}/\
	     {interp_method_id}/{frequency}/{variable_id}/"

    cordex_adjust_interp:

        # Adapted for CORDEX-CMIP6

        metadata:
            - variable_id
            - project_id
            - activity_id
            - domain_id
            - institution_id
            - driving_source_id
            - driving_experiment_id
            - driving_variant_label
            - source_id
            - version_realization
            - frequency
            - bc_method_id
            - bc_observation_id
            - bc_period
            - bc_info
            - interp_method_id
            - interp_observation_id
            - interp_period
            - interp_info
            - bc_interp_method_id
            - bc_interp_observation_id
            - bc_interp_period
            - bc_interp_info
            - frequency
            - start_time
            - end_time

        stem_pattern:
            "{variable_id}_{domain_id}_{driving_source_id}_{driving_experiment_id}_\
	     {driving_variant_label}_{institution_id}_{source_id}_\
	     {version_realization}_{bc_interp_method_id}_\
             {frequency}_{start_time}-{end_time}"

        parent_pattern:
            "{project_id}/{activity_id}/{domain_id}/{institution_id}/\
	     {driving_source_id}/{driving_experiment_id}/\
	     {driving_variant_label}/{source_id}/{version_realization}/\
	     {bc_interp_method_id}/{frequency}/{variable_id}/"

    cordex_cmip6:

        # References
        # ----------

        # https://zenodo.org/records/15047096
        # CORDEX-CMIP6_archiving_specifications_20250321.pdf
        # https://github.com/WCRP-CORDEX/archive-specifications

        metadata:
            - project_id
            - activity_id
            - domain_id
            - institution_id
            - driving_source_id
            - driving_experiment_id
            - driving_variant_label
            - source_id
            - version_realization
            - frequency
            - variable_id

        stem_pattern:
            "{variable_id}_{domain_id}_{driving_source_id}_{driving_experiment_id}_\
	     {driving_variant_label}_{institution_id}_{source_id}_\
	     {version_realization}_{frequency}_{start_time}-{end_time}"

        parent_pattern:
            "{project_id}/{activity_id}/{domain_id}/{institution_id}/\
	     {driving_source_id}/{driving_experiment_id}/\
	     {driving_variant_label}/{source_id}/{version_realization}/\
	     {frequency}/{variable_id}/"

    hyras:

        metadata: []

        stem_pattern: "{variable_name}_hyras_{resolution}_{yyyy}_{hyr_version}"

        parent_pattern: "{product}/{variable_name}/{hyr_version}/{hyr_res}/"

    reanalysis:

        #      This format is based upon ERA5 data in DWD MAVIS
        #
        #      Exemplary file name is
        #        /path/to/reanalysis/reanalysis/ECMWF/IFS/ERA5/day/atmos/\
        #        tas/r1i1p1/tas_day_reanalysis_ERA5_r1i1p1_20100101-20101231.nc
        #
        #      Exemplary attributes are
        #          institute_id = ECMWF
        #          experiment_id = ERA5
        #          model_id = IFS
        #          product = reanalysis
        #          frequency = day
        #          modeling_realm = atmos

        metadata:
            - institute_id
            - experiment_id
            - model_id
            - product
            - frequency
            - modeling_realm
            - ensemble_member_id

        stem_pattern:
            "{variable_name}_{frequency}_{product}_{experiment_id}_\
             {ensemble_member_id}_{start_time}-{end_time}"

        parent_pattern:
            "reanalysis/reanalysis/{institute_id}/{model_id}/{experiment_id}/\
             {frequency}/{modeling_realm}/{variable_name}/\
             {ensemble_member_id}/"

    cosmo-rea6:

        metadata: []

        stem_pattern:
            "{variable_name}_{frequency}_reanalysis_COSMO-REA6_r1i1p1_{rest}"

        parent_pattern: null

    eobs:

        metadata: []

        stem_pattern: "{variable_name}_EOBS-0.1deg_v27.0e_{version}_{rest}"

        parent_pattern: null

    obs4mips:

        # References
        # ----------

        # https://pcmdi.github.io/obs4MIPs/dataStandards.html

        metadata:
            - variable_id
            - frequency
            - source_id
            - variant_label
            - grid_label
            - activity_id
            - institution_id
            - source_id
            - frequency
            - variable_id
            - grid_label
            - version

        stem_pattern:
            "{variable_id}_{frequency}_{source_id}_{variant_label}_\
             {grid_label}_{start_time}-{end_time}"

        parent_pattern:
            "{activity_id}/{institution_id}/{source_id}/{frequency}\
             /{variable_id}/{grid_label}/{version}"

    seamless:

        # This file pattern is and ad-hoc construction mimicking the CMOR
        # standard for DWD seamless. Ensemble member (e.g. r1i1p1) seems to be
        # missing from the files metadata

        metadata:
            - institute_id  # DWD
            - experiment_id  # seas200001
            - model_id  # GCFS1
            - product  # hindcast
            - modeling_realm  # atmos
            - frequency  # day
            - ensemble_member  # r1i1p1

        # Exemplary file
        # --------------

        # tas_day_GCFS1_seas200001_r1i1p1_2000010100-2000063018.nc

        stem_pattern: "{variable_id}_{frequency}_{model_id}_{experiment_id}_\
                       {ensemble_member}_{start_time}-{end_time}"

        # Exemplary directory
        # -------------------

        # /path/to/projectdata/seasonalfc/hindcasts/DWD/GCFS1/seas200001/\
        # day/atmos/tas/r1i1p1/

        parent_pattern: "{product}/{institute_id}/{model_id}/\
                         {experiment_id}/{frequency}/{modeling_realm}/\
                         {variable_id}/{ensemble_member}"
