---

coordinates:

    time:
        attrs:
            standard_name: "time"
            long_name: "time"
            axis: "T"
            # units: set in the encoding field `ds.time.encoding`
            # calendar: Set automatically from ds.time.dt.calendar
        encoding:
            dtype: 'float64'
            _FillValue: null
            units: 'days since 1949-12-01T00:00:00Z'
        aliases: []

    lat:
        attrs:
            standard_name: 'latitude'
            long_name: 'latitude'
            units: 'degrees_north'
        aliases:
            - 'lats'
            - 'latitude'
            - 'latitudes'
            - 'LAT'
            - 'LATS'
            - 'LATITUDE'
            - 'LATITUDES'

    lon:
        attrs:
            standard_name: 'longitude'
            long_name: 'longitude'
            units: 'degrees_east'
        aliases:
            - 'lons'
            - 'longitude'
            - 'longitudes'
            - 'LON'
            - 'LONS'
            - 'LONGITUDE'
            - 'LONGITUDES'

    y:
        attrs:
            long_name: 'y coordinate of projection'
            standard_name: 'projection_y_coordinate'
            units: 'm'
        aliases:
            - 'Y'

    x:
        attrs:
            long_name: 'x coordinate of projection'
            standard_name: 'projection_x_coordinate'
            units: 'm'
        aliases:
            - 'X'

    rlat:
        attrs:
            standard_name: 'grid_latitude'
            long_name: 'latitude in rotated pole grid'
            units: 'degrees'
            axis: 'Y'
        aliases:
            - 'RLAT'

    rlon:
        attrs:
            standard_name: 'grid_longitude'
            long_name: 'longitude in rotated pole grid'
            units: 'degrees'
            axis: 'X'
        aliases:
            - 'RLON'

variables:

    tos:
      long_name: Sea Surface Temperature
      standard_name: sea_surface_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
          - sst  # GRIB 34
          - sea_surface_temperature  # CDS

    ta:
      long_name: Air Temperature
      standard_name: air_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
        - t  # GRIB 130
        # - temperature  # CDS would conflict with HOSTRADA below

    tas:
      long_name: Near-Surface Air Temperature
      standard_name: air_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
        - t2m  # GRIB 167
        - 2m_temperature  # CDS
        - T_2M  # COSMO CLM
        - tasAdjustInterp  # SK CORDEX adjusted and interpolated
        - temperature  # HOSTRADA

    tasmax:
      long_name: Daily Maximum Near-Surface Air Temperature
      standard_name: air_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
        - mx2t  # GRIB 201
        - maximum_2m_temperature_since_previous_post_processing  # CDS
        - TMAX_2M  # CLM
        - tmax  # HYRAS
        - tasmaxAdjustInterp  # SK CORDEX adjusted and interpolated

    tasmin:
      long_name: Daily Minimum Near-Surface Air Temperature
      standard_name: air_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
        - mn2t  # GRIB 202
        - minimum_2m_temperature_since_previous_post_processing  # CDS
        - TMIN_2M  # CLM
        - tmin  # HYRAS
        - tasminAdjustInterp  # SK CORDEX adjusted and interpolated

    ts:
      long_name: Surface Temperature
      standard_name: surface_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
        - T_S  # COSMO CLM

    tdps:
      long_name: Near-Surface Dewpoint Temperature
      standard_name: dewpoint_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [-1000, 1000]
      aliases:
        - d2m  # GRIB 168
        - 2m_dewpoint_temperature  # CDS

    tdew:
      comment: tdew is not defined in the CMOR standard
      long_name: Daily Mean Dew-point Temperature
      standard_name: dew_point_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
        - dewpoint  # HOSTRADA
        - tdewAdjustInterp  # SK CORDEX adjusted and interpolated

    cclm-td-2m:
      comment: Variable without CORDEX standard
      long_name: 2m Dew Point Temperature
      standard_name: dew_point_temperature
      units: kelvins
      cmor_units: 'K'
      valid_bounds: [50, 500]
      aliases:
        - TD_2M  # COSMO-CLM

    hur:
      long_name: Relative Humidity
      standard_name: relative_humidity
      units: percent
      cmor_units: '%'
      valid_bounds: [0, 100]
      aliases:
        - r  # GRIB 157
        - humidity  # CDS

    hurs:
      long_name: Near-Surface Relative Humidity
      standard_name: relative_humidity
      units: percent
      cmor_units: '%'
      valid_bounds: [0, 100]
      aliases:
        - humidity  # HOSTRADA
        - hursAdjustInterp  # SK CORDEX adjusted and interpolated

    pr:
      long_name: Precipitation
      standard_name: precipitation_flux
      units: kg m^-2 s^-1
      cmor_units: 'kg m-2 s-1'
      valid_bounds: [0, 0.3]
      aliases:
        - tp  # GRIB 228
        - avg_tprate  # CDS averaged
        - TOT_PREC  # CLM
        - prAdjustInterp  # SK CORDEX adjusted-interpolated
        - RR  # RADKLIM
        - precipitation_flux

    rsds:
      long_name: Surface Downwelling Shortwave Radiation
      standard_name: surface_downwelling_shortwave_flux_in_air
      units: W m^-2
      cmor_units: 'W m-2'
      valid_bounds: [-3000, 3000]
      aliases:
        - ssrd  # GRIB 169
        - surface_solar_radiation_downwards  # CDS
        - rsdsAdjustInterp  # CORDEX adjusted-interpolated
        - ASWD_S  # COSMO-CLM
        - SIS  # HR HOSTRADA

    sfcWind:
      long_name: Near-Surface Wind Speed
      standard_name: wind_speed
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [0, 100]
      aliases:
        - sfcWindAdjustInterp  # SK CORDEX adjusted and interpolated
        - FF  # HR HOSTRADA
        - SP_10M  # COSMO-CLM

    psl:
      long_name: Sea Level Pressure
      standard_name: air_pressure_at_sea_level
      units: Pa
      cmor_units: Pa
      valid_bounds: [60000, 120000]
      aliases:
        - msl  # GRIB 151
        - mean_sea_level_pressure  # CDS
        - pslAdjustInterp  # SK CORDEX adjusted and interpolated
        - SLP  # HR HOSTRADA
        - PMSL  # COSMO-CLM

    ps:
      long_name: Surface Air Pressure
      standard_name: surface_air_pressure
      units: Pa
      cmor_units: Pa
      valid_bounds: [60000, 120000]
      aliases:
        - sp  # GRIB 134
        - surface_pressure  # CDS
        - psAdjustInterp  # SK CORDEX adjusted-interpolated
        - air_pressure  # HR HOSTRADA

    huss:
      long_name: Near-Surface Specific Humidity
      standard_name: specific_humidity
      units: dimensionless
      cmor_units: '1'
      valid_bounds: [0, 1]
      aliases:
        - hussAdjustInterp  # SK CORDEX adjusted and interpolated
        - QV_2M  # COSMO-CLM

    mixr:
      comment: >
          humrs is not defined in the CMOR standard see GRIB2 - TABLE 4.2-0-1
          number 02 Humidity mixing ratio of a parcel of moist air is the
          ratio of the mass of water vapor to the mass of dry air.
      long_name: Near-Surface Water Vapor Mixing Ratio
      standard_name: humidity_mixing_ratio
      units: dimensionless
      cmor_units: '1'
      valid_bounds: [0, 1]
      aliases:
        - vapor  # HR HOSTRADA

    clt:
      comment: >
          Cloud fraction is defined as a percentage of covered area not in
          "Octas" like station observations
      long_name: Total Cloud Fraction
      standard_name: cloud_area_fraction
      units: percent
      cmor_units: '%'
      valid_bounds: [0, 100]
      aliases:
        - tcc  # GRIB 164
        - total_cloud_cover  # CDS
        - CF  # HR HOSTRADA

    cclm-clct:
      comment: Variable without CORDEX standard
      long_name: Total Cloud Cover
      standard_name: cloud_area_fraction
      units: percent
      cmor_units: '%'
      valid_bounds: [0, 100]
      aliases:
        - CLCT  # COSMO-CLM

    ssr:
      long_name: Surface Net Solar Radiation
      standard_name: surface_net_solar_radiatio
      units: W m^-2
      cmor_units: 'W m-2'
      valid_bounds: [-100000, 100000]
      aliases:
        - ssr  # GRIB 176
        - surface_net_solar_radiation  # CDS

    rlut:
      long_name: Top net thermal radiation
      standard_name: toa_outgoing_longwave_flux
      units: W m^-2
      cmor_units: 'W m-2'
      valid_bounds: [-100000, 100000]
      aliases:
        - ttr  # GRIB 179
        - top_net_thermal_radiation  # CDS

    rlds:
      long_name: Surface Downwelling Longwave Radiation
      standard_name: surface_downwelling_longwave_flux_in_air
      units: W m^-2
      cmor_units: 'W m-2'
      valid_bounds: [-3000, 3000]
      aliases:
        - strd  # GRIB 175
        - surface_thermal_radiation_downwards  # CDS
        - SDL  # HOSTRADA
        - ALWD_S  # COSMO-CLM

    rlus:
      long_name: Surface Upwelling Longwave Radiation
      standard_name: surface_upwelling_longwave_flux_in_air
      units: W m^-2
      cmor_units: 'W m-2'
      valid_bounds: [-3000, 3000]
      aliases:
        - SOL  # HOSTRADA
        - ALWU_S  # COSMO-CLM

    sd:
      comment: Unit to clarify
      long_name: Snow depth
      standard_name: snow_depth
      units: 'm of water equivalen'
      cmor_units: 'm of water equivalent'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - sd  # GRIB 141
        - snow_depth  # CDS

    snd:
      long_name: Snow Depth
      standard_name: surface_snow_thickness
      units: m
      cmor_units: 'm'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - H_SNOW  # COSMO-CLM

    va:
      long_name: Northward Wind
      standard_name: northward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - v  # GRIB 132
        - v_component_of_wind  # CDS

    vas:
      long_name: Northward Near-Surface Wind
      standard_name: northward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - v10  # GRIB 166
        - 10m_v_component_of_wind  # CDS
        - V_10M  # ICON, COSMO-CLM

    ua:
      long_name: Eastward Wind
      standard_name: eastward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - u  # GRIB 131
        - u_component_of_wind  # CDS

    uas:
      long_name: Eastward Near-Surface Wind
      standard_name: eastward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - u10  # GRIB 165
        - 10m_u_component_of_wind  # CDS
        - U_10M  # ICON, COSMO-CLM

    va850:
      long_name: Northward Wind
      standard_name: northward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - V850p  # ICON, COSMO-CLM

    ua850:
      long_name: Eastward Wind
      standard_name: eastward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - U850p  # ICON, COSMO-CLM

    va100m:
      long_name: Northward Wind at 100m
      standard_name: northward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - V100z  # ICON, COSMO-CLM

    ua100m:
      long_name: Eastward Wind at 100m
      standard_name: eastward_wind
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - U100z  # ICON, COSMO-CLM

    sfcWindmax:
      long_name: Daily Maximum Near-Surface Wind Speed
      standard_name: wind_speed
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - VABSMX_10M  # ICON, COSMO-CLM

    snc:
      long_name: Snow Area Fraction
      standard_name: surface_snow_area_fraction
      units: percent
      cmor_units: '%'
      valid_bounds: [0, 100]
      aliases:
        - FR_SNOW  # ICON, COSMO-CLM

    wsgsmax:
      long_name: Maximum Near-Surface Wind Speed of Gust
      standard_name: wind_speed_of_gust
      units: m s^-1
      cmor_units: 'm s-1'
      valid_bounds: [-1E-6, 1E+6]
      aliases:
        - VMAX_10M  # ICON, COSMO-CLM

    cclm-athb-s:
      comment: Variable without CORDEX standard
      long_name: Averaged Surface Net Downward Longwave Radiation
      standard_name: surface_net_downward_longwave_flux
      units: W m^-2
      cmor_units: 'W m-2'
      valid_bounds: [-3000, 3000]
      aliases:
        - ATHB_S  # ICON, COSMO-CLM

    sfcWind_direction:
      comment: Variable without CORDEX standard
      long_name: Near-Surface Wind Direction
      standard_name: wind_direction
      units: degree
      cmor_units: 'degree'
      aliases:
        - DD  # HR HOSTRADA

    uhi:
      comment: Variable without CORDEX standard
      long_name: Canopy Urban Heat Island Intensity
      standard_name: canopy_urban_heat_island_intensity
      units: kelvins
      cmor_units: 'K'
      aliases:
        - urbanheatisland  # HR HOSTRADA

    zg:
      comment: Not referenced.
      long_name: Geopotential Height
      standard_name: geopotential_height
      units: m^2 s^-2
      cmor_units: m2 s-2
      aliases:
        - z  # GRIB 129
        - geopotential  # CDS

    pevpr:
      comment: Not referenced
      long_name: Mean potential evaporation rate
      standard_name: mean_potential_evaporation_rate
      units: kg m^-2 s^-1
      cmor_units: kg m-2 s-1
      aliases:
        - mper  # GRIB 70
        - mean_potential_evaporation_rate  # CDS

    evspsbl:
      comment: "Unit is 'm of water equivalent'"
      long_name: Evaporation
      standard_name: water_evaporation
      units: m
      cmor_units: m
      aliases:
        - e  # GRIB 182
        - evaporation  # CDS

    sic:
      comment: No comment
      long_name: Sea Ice Cover
      standard_name: sea_ice_cover
      units: dimensionless
      cmor_units: 1
      aliases:
        - ci  # GRIB 31
        - sea_ice_cover  # CDS

    orog:
      long_name: Surface Altitude
      standard_name: surface_altitude
      units: m
      cmor_units: m
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - HSURF  # ICON

    sftlf:
      long_name: Percentage of the Grid Cell Occupied by Land
      standard_name: land_area_fraction
      units: '%'
      cmor_units: '%'
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - FR_LAND  # ICON

    tsl:
      long_name: Temperature of Soil
      standard_name: soil_temperature
      units: K
      cmor_units: K
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    prc:
      long_name: Convective Precipitation
      standard_name: convective_precipitation_flux
      units: kg m-2 s-1
      cmor_units: kg m-2 s-1
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - PREC_CON  # ICON

    prhmax:
      long_name: Daily Maximum Hourly Precipitation Rate
      standard_name: precipitation_flux
      units: kg m-2 s-1
      cmor_units: kg m-2 s-1
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    prsn:
      long_name: Snowfall Flux
      standard_name: snowfall_flux
      units: kg m-2 s-1
      cmor_units: kg m-2 s-1
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - TOT_SNOW  # ICON

    mrros:
      long_name: Surface Runoff
      standard_name: surface_runoff_flux
      units: kg m-2 s-1
      cmor_units: kg m-2 s-1
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    mrro:
      long_name: Total Runoff
      standard_name: runoff_flux
      units: kg m-2 s-1
      cmor_units: kg m-2 s-1
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    snm:
      long_name: Surface Snow Melt
      standard_name: surface_snow_melt_flux
      units: kg m-2 s-1
      cmor_units: kg m-2 s-1
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    tauu:
      long_name: Surface Downward Eastward Wind Stress
      standard_name: surface_downward_eastward_stress
      units: Pa
      cmor_units: Pa
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - AUMFL_S  # ICON

    tauv:
      long_name: Surface Downward Northward Wind Stress
      standard_name: surface_downward_northward_stress
      units: Pa
      cmor_units: Pa
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - AVMFL_S  # ICON

    sund:
      long_name: Daily Duration of Sunshine
      standard_name: duration_of_sunshine
      units: s
      cmor_units: s
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
          - DURSUN  # ICON

    rsdsdir:
      long_name: Surface Direct Downwelling Shortwave Radiation
      standard_name: surface_direct_downwelling_shortwave_flux_in_air
      units: W m-2
      cmor_units: W m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - ASODIRD_S  # ICON

    rsus:
      long_name: Surface Upwelling Shortwave Radiation
      standard_name: surface_upwelling_shortwave_flux_in_air
      units: W m-2
      cmor_units: W m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - ASODIFU_S  # ICON

    rsdt:
      long_name: TOA Incident Shortwave Radiation
      standard_name: toa_incoming_shortwave_flux
      units: W m-2
      cmor_units: W m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - ASOD_T  # ICON

    rsut:
      long_name: TOA Outgoing Shortwave Radiation
      standard_name: toa_outgoing_shortwave_flux
      units: W m-2
      cmor_units: W m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: 
        - ASOU_T  # ICON

    hfls:
      long_name: Surface Upward Latent Heat Flux
      standard_name: surface_upward_latent_heat_flux
      units: W m-2
      cmor_units: W m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - ALHFL_S  # ICON

    hfss:
      long_name: Surface Upward Sensible Heat Flux
      standard_name: surface_upward_sensible_heat_flux
      units: W m-2
      cmor_units: W m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - ASHFL_S  # ICON

    mrfso:
      long_name: Soil Frozen Water Content
      standard_name: soil_frozen_water_content
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    mrfsos:
      long_name: Frozen Water Content in Upper Portion of Soil Column
      standard_name: frozen_water_content_of_soil_layer
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    mrsfl:
      long_name: Frozen Water Content of Soil Layer
      standard_name: frozen_water_content_of_soil_layer
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    mrso:
      long_name: Total Soil Moisture Content
      standard_name: mass_content_of_water_in_soil
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    mrsos:
      long_name: Moisture in Upper Portion of Soil Column
      standard_name: mass_content_of_water_in_soil_layer
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    mrsol:
      long_name: Total Water Content of Soil Layer
      standard_name: mass_content_of_water_in_soil_layer
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    snw:
      long_name: Surface Snow Amount
      standard_name: surface_snow_amount
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    siconca:
      long_name: Sea-Ice Area Percentage (Atmospheric Grid)
      standard_name: sea_ice_area_fraction
      units: '%'
      cmor_units: '%'
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    zmla:
      long_name: Height of Boundary Layer
      standard_name: atmosphere_boundary_layer_thickness
      units: m
      cmor_units: m
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - HPBL  # ICON

    prw:
      long_name: Water Vapor Path
      standard_name: atmosphere_mass_content_of_water_vapor
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - TQV  # ICON

    clwvi:
      long_name: Condensed Water Path
      standard_name: atmosphere_mass_content_of_cloud_condensed_water
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - TQW  # ICON

    clivi:
      long_name: Ice Water Path
      standard_name: atmosphere_mass_content_of_cloud_ice
      units: kg m-2
      cmor_units: kg m-2
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases:
        - TQI  # ICON

    ua1000:
      long_name: Eastward Wind at 1000hPa
      standard_name: eastward_wind
      units: m s-1
      cmor_units: m s-1
      valid_bounds: [-1.0e+20, 1.0e+20]
      aliases: []

    ua925:
      long_name: Eastward Wind at 925hPa
